<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독해와작문 [2과 여가와 취미]</title>
<style>
  :root{
    --bg:#f4f1ec;
    --card:#ffffff;
    --accent:#c0392b;
    --accent2:#2c5f7c;
    --blue:#1a56db;
    --text:#2c2c2c;
    --sub:#8a8a8a;
    --border:#e4ded3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 60px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .logo-flower{
    position:relative;
    width:52px;
    height:52px;
    flex-shrink:0;
  }
  .petal{
    position:absolute;
    mix-blend-mode:multiply;
  }
  .petal.yellow{
    width:32px;height:36px;
    top:0;left:11px;
    background:#f5e08a;
    border-radius:50% 50% 45% 45% / 60% 60% 40% 40%;
    transform:rotate(-8deg);
  }
  .petal.blue{
    width:30px;height:30px;
    top:13px;left:0;
    background:#a9d3e8;
    border-radius:50%;
  }
  .petal.pink{
    width:34px;height:36px;
    top:20px;left:10px;
    background:#f2c1da;
    border-radius:45% 45% 55% 55% / 40% 40% 60% 60%;
  }
  .petal.green{
    width:26px;height:26px;
    top:10px;left:24px;
    background:#c7d98d;
    border-radius:50%;
  }
  .petal.peach{
    width:20px;height:20px;
    top:4px;left:16px;
    background:#f0ba90;
    border-radius:50%;
  }
  .logo-flower span{
    position:absolute;
    font-size:9px;
    font-weight:700;
    color:#fff;
    text-shadow:0 0 2px rgba(0,0,0,0.15);
  }
  .logo-flower .ch1{ top:20px; left:6px; }
  .logo-flower .ch2{ top:20px; left:19px; }
  .logo-flower .ch3{ top:16px; left:31px; color:#e9e9e9; }
  .brand-name{
    font-size:19px;
    font-weight:800;
    letter-spacing:-0.3px;
  }
  .brand-name .c1{ color:#e79ac0; }
  .brand-name .c2{ color:#8ec3e0; }
  .brand-name .c3{ color:#9a9a9a; }
  h1{
    font-size:20px;
    margin:0 0 4px;
    font-weight:700;
  }
  .subtitle{
    font-size:13px;
    color:var(--sub);
    margin-bottom:18px;
  }
  .controls-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:16px;
  }
  .tab{
    padding:7px 14px;
    border-radius:20px;
    border:1px solid var(--border);
    background:#fff;
    font-size:13px;
    cursor:pointer;
    color:var(--text);
  }
  .tab.active{
    background:var(--accent2);
    color:#fff;
    border-color:var(--accent2);
  }
  .progress-wrap{
    width:100%;
    max-width:420px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:13px;
    color:var(--sub);
    margin-bottom:10px;
  }
  .progress-bar-bg{
    width:100%;
    max-width:420px;
    height:5px;
    background:var(--border);
    border-radius:4px;
    overflow:hidden;
    margin-bottom:22px;
  }
  .progress-bar-fill{
    height:100%;
    background:var(--accent2);
    transition:width .2s ease;
  }
  .card-wrap{
    width:100%;
    max-width:420px;
    height:320px;
    perspective:1200px;
    margin-bottom:22px;
  }
  .card{
    position:relative;
    width:100%;
    height:100%;
    transition:transform .45s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
    cursor:pointer;
  }
  .card.flipped{
    transform:rotateY(180deg);
  }
  .card.no-anim{
    transition:none !important;
  }
  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:18px;
    background:var(--card);
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
    border:1px solid var(--border);
  }
  .face.back{
    transform:rotateY(180deg);
  }
  .tag{
    position:absolute;
    top:14px;
    left:16px;
    font-size:11px;
    color:var(--sub);
    background:var(--bg);
    padding:3px 9px;
    border-radius:10px;
  }
  .word{
    font-size:clamp(44px, 14vw, 66px);
    font-weight:700;
    line-height:1.3;
    word-break:keep-all;
  }
  .reading{
    font-size:18px;
    color:var(--accent2);
    margin-top:10px;
  }
  .meaning{
    font-size:clamp(22px, 6.5vw, 28px);
    font-weight:700;
    color:var(--blue);
    margin-bottom:10px;
  }
  .word-back{
    font-size:clamp(28px, 8.5vw, 36px);
    font-weight:400;
    color:var(--text);
    margin-bottom:10px;
  }
  .reading-small{
    font-size:clamp(22px, 6.5vw, 28px);
    font-weight:700;
    color:var(--text);
  }
  .hint{
    font-size:12px;
    color:var(--sub);
    margin-top:6px;
  }
  .nav-row{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:16px;
  }
  .nav-btn{
    width:52px;
    height:52px;
    border-radius:50%;
    border:none;
    background:var(--accent2);
    color:#fff;
    font-size:20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .nav-btn:active{
    transform:scale(0.95);
  }
  .flip-btn{
    background:var(--accent);
    border-radius:24px;
    width:auto;
    padding:0 22px;
    font-size:14px;
    height:44px;
  }
  .know-row{
    display:flex;
    gap:10px;
    margin-bottom:8px;
  }
  .know-btn{
    padding:8px 16px;
    border-radius:20px;
    border:1px solid var(--border);
    background:#fff;
    font-size:13px;
    cursor:pointer;
  }
  .know-btn.on-known{
    background:#e7f3ea;
    border-color:#3f9a55;
    color:#2c6e3d;
  }
  .know-btn.on-unknown{
    background:#fbeaea;
    border-color:var(--accent);
    color:var(--accent);
  }
  .bottom-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:6px;
  }
  .small-btn{
    padding:7px 13px;
    border-radius:16px;
    border:1px solid var(--border);
    background:#fff;
    font-size:12px;
    color:var(--sub);
    cursor:pointer;
  }
  .small-btn.active{
    background:#fff3e0;
    border-color:#e0a030;
    color:#a06a00;
  }
  .empty{
    text-align:center;
    color:var(--sub);
    font-size:14px;
    margin-top:40px;
    line-height:1.6;
  }
</style>
</head>

<h1>독해와작문 [2과 여가와 취미]</h1>

</div>

<div class="know-row">

</div>

<div class="nav-row">

  <button class="nav-btn" id="nextBtn">›</button>
</div>

<div class="bottom-row">

  {k:"ドンアリ", r:"", m:"동아리", cat:"가나"},
];

// ---------------- 상태 ----------------
const STORAGE_KEY = "jp_flashcards_progress_v2";
let known = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); // {index: true}
let currentCat = "전체";
let order = [];
let pos = 0;
let flipped = false;
let reviewOnly = false;

function cardId(card){ return card.k + "|" + card.r; }

function buildOrder(){
  let base = DATA.map((c,i)=>i).filter(i=>{
    const c = DATA[i];
    if(currentCat !== "전체" && c.cat !== currentCat) return false;
    if(reviewOnly && known[cardId(c)]) return false;
    return true;
  });
  order = base;
  pos = 0;
}

function shuffleOrder(){
  for(let i=order.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [order[i],order[j]] = [order[j],order[i]];
  }
  pos = 0;
  render();
}

function resetShuffleOrder(){
  buildOrder();
  render();
}

function saveProgress(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(known));
}

function countKnownInScope(){
  let scopeIdx = DATA.map((c,i)=>i).filter(i => currentCat==="전체" || DATA[i].cat===currentCat);
  return scopeIdx.filter(i => known[cardId(DATA[i])]).length;
}

function render(){
  const total = order.length;
  document.getElementById("totalCount").textContent = DATA.length;
  document.getElementById("knownLabel").textContent = "외운 단어: " + countKnownInScope();

  const cardEl = document.getElementById("card");
  const wasFlipped = cardEl.classList.contains("flipped");
  if(wasFlipped){
    cardEl.classList.add("no-anim");
  }
  cardEl.classList.remove("flipped");
  flipped = false;

  if(total === 0){
    document.getElementById("posLabel").textContent = "0 / 0";
    document.getElementById("progressFill").style.width = "0%";
    document.getElementById("wordFront").textContent = "";
    document.getElementById("meaningBack").textContent = "";
    document.getElementById("readingBack").textContent = "";
    document.getElementById("tagFront").textContent = "";
    document.getElementById("tagBack").textContent = "";
    document.querySelector(".card-wrap").style.display = "none";
    document.querySelector(".nav-row").style.display = "none";
    document.querySelector(".know-row").style.display = "none";
    let empty = document.getElementById("emptyMsg");
    if(!empty){
      empty = document.createElement("div");
      empty.id = "emptyMsg";
      empty.className = "empty";
      empty.textContent = "🎉 이 조건에 해당하는 카드가 없어요.\n(안 외운 단어만 보기를 껐다가 다시 시도해보세요)";
      document.body.appendChild(empty);
    }
    return;
  } else {
    document.querySelector(".card-wrap").style.display = "";
    document.querySelector(".nav-row").style.display = "";
    document.querySelector(".know-row").style.display = "";
    const empty = document.getElementById("emptyMsg");
    if(empty) empty.remove();
  }

  const idx = order[pos];
  const card = DATA[idx];

  document.getElementById("posLabel").textContent = (pos+1) + " / " + total;
  document.getElementById("progressFill").style.width = ((pos+1)/total*100) + "%";

  document.getElementById("wordFront").textContent = card.k;
  document.getElementById("tagFront").textContent = card.cat;
  document.getElementById("tagBack").textContent = card.cat;
  document.getElementById("wordBack").textContent = card.k;
  document.getElementById("readingBack").textContent = card.r ? card.r : "";
  document.getElementById("meaningBack").textContent = card.m;

  const isKnown = known[cardId(card)];
  document.getElementById("knownBtn").classList.toggle("on-known", !!isKnown);
  document.getElementById("unknownBtn").classList.toggle("on-unknown", isKnown === false);

  if(wasFlipped){
    // force reflow so the instant (no-transition) reset actually applies,
    // then re-enable the flip animation for the next manual flip
    void cardEl.offsetHeight;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        cardEl.classList.remove("no-anim");
      });
    });
  }
}

function flip(){
  if(order.length === 0) return;
  flipped = !flipped;
  document.getElementById("card").classList.toggle("flipped", flipped);
}

function next(){
  if(order.length === 0) return;
  pos = (pos+1) % order.length;
  render();
}
function prev(){
  if(order.length === 0) return;
  pos = (pos-1+order.length) % order.length;
  render();
}

function markKnown(val){
  if(order.length===0) return;
  const card = DATA[order[pos]];
  if(val === null){
    delete known[cardId(card)];
  } else {
    known[cardId(card)] = val;
  }
  saveProgress();
  render();
}

// ---------------- 이벤트 ----------------
document.getElementById("card").addEventListener("click", flip);
document.getElementById("flipBtn").addEventListener("click", flip);
document.getElementById("nextBtn").addEventListener("click", next);
document.getElementById("prevBtn").addEventListener("click", prev);
document.getElementById("shuffleBtn").addEventListener("click", shuffleOrder);
document.getElementById("resetShuffleBtn").addEventListener("click", resetShuffleOrder);

document.getElementById("knownBtn").addEventListener("click", ()=>{
  const card = DATA[order[pos]];
  if(known[cardId(card)] === true){ markKnown(null); } else { markKnown(true); }
});
document.getElementById("unknownBtn").addEventListener("click", ()=>{
  const card = DATA[order[pos]];
  if(known[cardId(card)] === false){ markKnown(null); } else { markKnown(false); }
});

document.getElementById("reviewOnlyBtn").addEventListener("click", (e)=>{
  reviewOnly = !reviewOnly;
  e.target.classList.toggle("active", reviewOnly);
  buildOrder();
  render();
});

document.getElementById("resetProgressBtn").addEventListener("click", ()=>{
  if(confirm("외운 단어 표시를 전부 초기화할까요?")){
    known = {};
    saveProgress();
    render();
  }
});

document.addEventListener("keydown",(e)=>{
  if(e.code === "Space"){ e.preventDefault(); flip(); }
  else if(e.code === "ArrowRight"){ next(); }
  else if(e.code === "ArrowLeft"){ prev(); }
});

// 카테고리 탭
const cats = ["전체","한자","가나"];
const catLabels = {"전체":"전체","한자":"한자 단어","가나":"히라가나/가타카나"};
const tabsWrap = document.getElementById("catTabs");
cats.forEach(cat=>{
  const btn = document.createElement("button");
  btn.className = "tab" + (cat===currentCat ? " active" : "");
  btn.textContent = catLabels[cat];
  btn.addEventListener("click", ()=>{
    currentCat = cat;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    btn.classList.add("active");
    buildOrder();
    render();
  });
  tabsWrap.appendChild(btn);
});

// 초기화
buildOrder();
render();
</script>
</body>
</html>
